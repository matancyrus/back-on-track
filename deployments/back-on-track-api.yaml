apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
---            
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: testing
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-on-track-api
  namespace: testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-on-track-api
  template:
    metadata:
      labels:
        app: back-on-track-api
    spec:
      containers:
        - name: back-on-track-api
          image: matancyrus/back-on-track:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-on-track-api-service
  namespace: testing
spec:
  selector:
    app: back-on-track-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: testing
data:
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"